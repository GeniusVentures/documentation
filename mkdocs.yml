site_name: Gnus.ai Docs
docs_dir: docs
site_dir: site
use_directory_urls: true
exclude_docs: |
  .*                      # Exclude ALL dot-files/directories by default
  !.gitbook/assets        # Include .gitbook/assets and everything inside it
  !.gitbook/assets/**

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji
  - admonition
  - attr_list
  - md_in_html

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
  - javascripts/external-links.js

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - redirects:
      redirect_maps:
        technical-information/super-genius-blockchain-technicial-details/README.md: technical-information/super-genius-blockchain-technical-details/README.md
