site_name: GNUS.ai Docs
docs_dir: docs
site_dir: site
use_directory_urls: true

hooks:
  - scripts/rewrite_gitbook_paths.py


theme:
  name: material
  # Features that make it feel more GitBook-like
  features:
    - navigation.indexes           # Let section index pages (README.md / index.md) work as section landing pages
    - navigation.top               # Sticky top nav bar
    - navigation.footer            # Footer with prev/next
    - navigation.instant           # Faster page loads (SPA-like)
    - navigation.tracking          # Keep active nav item highlighted and URL in sync
    - navigation.path              # Show breadcrumb path in nav
    - search.suggest               # Autocomplete search
    - search.highlight             # Highlight search results
    - content.tabs                 # Tabbed content blocks
    - content.code.copy            # Copy code buttons
    - toc.integrate                # Table of contents integrated into sidebar

  # Light/dark/auto switching
  palette:
    # Light mode — custom scheme so CSS variables control all colors
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Optional: Add auto/system preference toggle (three-state: light / dark / auto)
  # palette:
  #   - media: "(prefers-color-scheme)"
  #     toggle:
  #       icon: material/brightness-auto
  #       name: Switch to system preference
  #   # Then the two above...

# Extra goodies for GitBook feel
plugins:
  - search
  - section-index
  - literate-nav:
      nav_file: SUMMARY_EXT.md
  #- git-revision-date-localized:  # Shows last updated dates
  - redirects:
      redirect_maps:

validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: ignore
  nav:
    omitted_files: ignore
    not_found: ignore

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
  - javascripts/external-links.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/nav-state.js
  - javascripts/breadcrumbs.js
